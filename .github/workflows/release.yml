name: Release T114 Firmware

on:
  push:
    branches: [main]
    # Skip pushes that only touch non-firmware-affecting files (specs, docs,
    # markdown, agent config, etc.). If a push touches BOTH ignored AND
    # source paths, the workflow still runs — paths-ignore only matches when
    # *every* changed file is in the list. Add to the firmware-affecting set
    # rather than this one when in doubt.
    paths-ignore:
      - '**/*.md'
      - 'openspec/**'
      - 'docs/**'
      - 'img/**'
      - 'firmware-examples/**'
      - '.claude/**'
      - '.beads/**'
      - 'LICENSE'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute CalVer tag
        id: tag
        run: echo "tag=v$(date -u +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build ff-builder image
        run: docker build -t ff-builder .

      - name: Compile T114 firmware
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" ff-builder

      - name: Rename firmware asset to match release tag
        id: asset
        run: |
          ASSET="friend-finder-${{ steps.tag.outputs.tag }}.uf2"
          mv output/firmware.uf2 "output/${ASSET}"
          echo "name=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Friend Finder ${{ steps.tag.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## Meshtastic Friend Finder ${{ steps.tag.outputs.tag }}

            ### Heltec T114 (nRF52840) — Experimental

            Flash the attached `${{ steps.asset.outputs.name }}` using the UF2 bootloader:

            1. Double-press the reset button on the T114 — a USB drive named `T114_BOOT` (or similar) will appear on your computer.
            2. Drag and drop `${{ steps.asset.outputs.name }}` onto that drive.
            3. The device flashes automatically and reboots into the new firmware.

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md#heltec-t114-nrf52840--experimental) for full wiring and setup instructions.
          files: output/${{ steps.asset.outputs.name }}
