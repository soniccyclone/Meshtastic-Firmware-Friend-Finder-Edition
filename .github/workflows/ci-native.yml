name: Native CI

# Build the Meshtastic `native` (Portduino) PlatformIO environment with the
# FriendFinder patches applied. Uses the same Dockerfile the local dev loop
# uses, so CI and local reproduce each other bit-for-bit.
#
# What triggers a run:
#   - PRs touching the patcher, the native Dockerfile/entrypoint, or this
#     workflow itself. Upstream firmware changes outside this repo do not
#     trigger runs — the scheduled job below catches that drift.
#   - Pushes to main touching the same paths (post-merge verification).
#   - Weekly schedule — LeapYeet/firmware main can move under our patches,
#     so a recurring run catches anchor/guard drift before a human hits it.
#   - Manual dispatch.

on:
  pull_request:
    paths:
      - 'patch-native.py'
      - 'Dockerfile.native'
      - 'entrypoint-native.sh'
      - '.github/workflows/ci-native.yml'
  push:
    branches: [main]
    paths:
      - 'patch-native.py'
      - 'Dockerfile.native'
      - 'entrypoint-native.sh'
      - '.github/workflows/ci-native.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ff-builder-native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native
          load: true
          tags: ff-builder-native:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run `pio run -e native`
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" ff-builder-native:ci

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-log
          path: output/build.log
          if-no-files-found: warn
