name: PR Build T114 Firmware (RC)

# Build a flashable T114 UF2 on every PR that touches the T114 build surface
# and upload it as a workflow artifact. QA grabs the artifact from the
# workflow run page (linked in a PR comment) — no local toolchain required.
#
# Earlier versions of this workflow published a full GitHub Release per PR
# build, which polluted the public releases page (PR-RC tags sorted above
# the actual main-branch releases). Artifacts are scoped to the run, expire
# automatically (default 90d), and never touch the releases page.
#
# Triggers on PR events touching paths that affect the T114 build:
#   - patch-t114.py   : the patcher whose output lands in the UF2
#   - Dockerfile      : defines the ff-builder image
#   - build.sh        : local podman wrapper (kept in sync with CI semantics)
#   - entrypoint.sh   : what runs inside the container to compile
#   - this workflow   : so CI validates changes to itself

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'patch-t114.py'
      - 'Dockerfile'
      - 'build.sh'
      - 'entrypoint.sh'
      - '.github/workflows/pr-build-t114.yml'

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: pr-build-t114-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rc-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute artifact name
        id: meta
        run: |
          NAME="firmware-t114-pr${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          echo "artifact=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build ff-builder image
        run: docker build -t ff-builder .

      - name: Compile T114 firmware
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" ff-builder

      - name: Upload firmware artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: output/firmware.uf2
          if-no-files-found: error
          retention-days: 30

      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifact = '${{ steps.meta.outputs.artifact }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 12);
            const body = [
              `**RC build ready** for commit \`${sha}\`.`,
              ``,
              `Download: [\`${artifact}.zip\`](${runUrl}#artifacts) (from the workflow run's Artifacts section).`,
              ``,
              `Unzip and flash \`firmware.uf2\` to a T114: double-press reset, drop the file onto the \`T114_BOOT\` drive that appears.`,
              ``,
              `_Artifacts expire after 30 days. RC builds are no longer published as GitHub Releases — they're scoped to this PR's workflow runs._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
