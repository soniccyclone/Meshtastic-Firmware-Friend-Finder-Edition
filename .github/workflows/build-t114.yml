name: Build & Release T114 Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v2.7-FF-t114-1)"
        required: true
        default: "v2.7-FF-t114-1"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout firmware source (LeapYeet/firmware)
        uses: actions/checkout@v4
        with:
          repository: LeapYeet/firmware
          path: firmware-src
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache the PlatformIO home directory so the nRF52 platform + toolchain
      # (~500 MB) only downloads on the first run or when platformio.ini changes.
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-nrf52-${{ hashFiles('firmware-src/platformio.ini') }}
          restore-keys: pio-nrf52-

      - name: Install PlatformIO
        run: pip install platformio

      # SdFat (pulled in transitively via Adafruit TinyUSB MSC) uses `SS` as a
      # default parameter in SdFat.h:57, but the heltec_mesh_node_t114 board
      # variant does not define SS. Defining it as 0 satisfies the compiler;
      # the value is never used at runtime because Meshtastic doesn't use SD
      # cards on this target.
      - name: Patch T114 variant — define SS for SdFat compilation
        working-directory: firmware-src
        run: |
          python3 - <<'EOF'
          path = "variants/nrf52840/heltec_mesh_node_t114/platformio.ini"
          with open(path) as f:
              content = f.read()
          if "-DSS=" not in content:
              content = content.replace("-DHELTEC_T114", "-DHELTEC_T114\n  -DSS=0")
              with open(path, "w") as f:
                  f.write(content)
              print("Patched: added -DSS=0 to build_flags")
          else:
              print("Skipped: -DSS already defined")
          EOF

      - name: Build heltec-mesh-node-t114
        working-directory: firmware-src
        run: pio run --environment heltec-mesh-node-t114

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Friend Finder ${{ inputs.version }}"
          prerelease: ${{ inputs.prerelease }}
          body: |
            ## Meshtastic Friend Finder ${{ inputs.version }}

            ### Heltec T114 (nRF52840) — Experimental

            Flash the attached `firmware.uf2` using the UF2 bootloader:

            1. Double-press the reset button on the T114 — a USB drive named `T114_BOOT` (or similar) will appear on your computer.
            2. Drag and drop `firmware.uf2` onto that drive.
            3. The device flashes automatically and reboots into the new firmware.

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md#heltec-t114-nrf52840--experimental) for full wiring and setup instructions.
          files: firmware-src/.pio/build/heltec-mesh-node-t114/firmware.uf2
